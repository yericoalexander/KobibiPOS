version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pos_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: pos_db
    ports:
      - '5432:5432'
    volumes:
      - pos_db_data:/var/lib/postgresql/data

volumes:
  pos_db_data:
